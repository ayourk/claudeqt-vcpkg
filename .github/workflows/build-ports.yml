# .github/workflows/build-ports.yml
#
# Test-build each port in this registry on Windows to catch broken
# portfiles before anyone tries to use them from the main ClaudeQt
# repo.
#
# Uses vcpkg overlay-ports mode (--overlay-ports) rather than the
# git-registry mechanism — the registry's versions/*.json git-tree
# hashes describe the commit we're testing *this run*, so the
# registry view of itself is circular. Overlay ports read the files
# directly from the checked-out source tree.
#
# Triplet is x64-windows (shared) per the upstream vcpkg convention
# for port validation. Static triplets (e.g. x64-windows-static-md)
# are exercised downstream in the main claudeqt repo's release
# workflow.

name: Build Ports

on:
  push:
    branches: [main]
    paths:
      - 'ports/**'
      - '.github/workflows/build-ports.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ports/**'
      - '.github/workflows/build-ports.yml'
  workflow_dispatch:

jobs:
  build-windows:
    name: "Build: ${{ matrix.port }} (${{ matrix.triplet }})"
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        port: [extra-cmake-modules, kf5-syntax-highlighting]
        triplet: [x64-windows]

    env:
      VCPKG_ROOT: C:\vcpkg
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}

    steps:
      - name: Checkout registry
        uses: actions/checkout@v4

      - name: Bootstrap vcpkg
        shell: cmd
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git %VCPKG_ROOT%
          call %VCPKG_ROOT%\bootstrap-vcpkg.bat -disableMetrics

      - name: Build port
        shell: cmd
        run: >
          %VCPKG_ROOT%\vcpkg install ${{ matrix.port }}:${{ matrix.triplet }}
          --overlay-ports="%GITHUB_WORKSPACE%\ports"

      - name: Verify install
        shell: cmd
        run: "%VCPKG_ROOT%\\vcpkg list"

  build-summary:
    name: All ports
    runs-on: ubuntu-latest
    needs: build-windows
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.build-windows.result }}" != "success" ]; then
            echo "::error::One or more ports failed to build"
            exit 1
          fi
          echo "All ports built successfully"
