# .github/workflows/build-ports.yml
#
# Test-build each port in this registry on Windows to catch broken
# portfiles before anyone tries to use them from the main ClaudeQt
# repo.
#
# Uses a CI-only manifest (ci/vcpkg.json) to pin Qt at 6.4.2 for
# parity with the main repo, combined with --overlay-ports so our
# ports are read directly from the checked-out source tree rather
# than through the git-registry mechanism (whose versions/*.json
# git-tree hashes describe *this* commit — circular).
#
# Triplet is x64-windows-static-release (custom, under ci/triplets):
# static linkage so build-time tools (katehighlightingindexer) don't
# crash from missing DLLs, and release-only so the debug build
# doesn't exhaust the runner's ~14 GB disk. The main claudeqt repo
# uses x64-windows-static-md (custom); this is close enough for
# port validation.

name: Build Ports

on:
  push:
    branches: [main]
    paths:
      - 'ports/**'
      - 'ci/**'
      - '.github/workflows/build-ports.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ports/**'
      - 'ci/**'
      - '.github/workflows/build-ports.yml'
  workflow_dispatch:

jobs:
  build-windows:
    name: "Build all ports (${{ matrix.triplet }})"
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        triplet: [x64-windows-static-release]

    env:
      VCPKG_ROOT: C:\vcpkg
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}

    steps:
      - name: Checkout registry
        uses: actions/checkout@v4

      - name: Bootstrap vcpkg
        shell: cmd
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git %VCPKG_ROOT%
          call %VCPKG_ROOT%\bootstrap-vcpkg.bat -disableMetrics

      - name: Build all ports
        shell: cmd
        run: >
          %VCPKG_ROOT%\vcpkg install
          --overlay-ports="%GITHUB_WORKSPACE%\ports"
          --overlay-triplets="%GITHUB_WORKSPACE%\ci\triplets"
          --x-manifest-root="%GITHUB_WORKSPACE%\ci"
          --triplet=${{ matrix.triplet }}

      - name: Verify install
        shell: cmd
        run: "%VCPKG_ROOT%\\vcpkg list"
